$schema: https://json-schema.org/draft/2020-12/schema
title: Event
description: |
  An event in the history of a heritage object — production, restoration, modification,
  acquisition — modelled as a CIDOC-CRM E5 Event. Profiles PROV-O's Activity: `startedAtTime`/
  `endedAtTime` carry the time-span (P4_has_time-span), `wasAssociatedWith` the actors who
  carried it out (P14_carried_out_by), `used`/`generated` the objects involved (P16_used_specific_object
  / P108_has_produced / P31_has_modified) and `atLocation` where it took place (P7_took_place_at).
  This block adds a local identifier and a CIDOC-CRM event type.
x-jsonld-context: context.jsonld
allOf:
  - "$ref": bblocks://ogc.ogc-utils.prov-activity
  - type: object
    properties:
      identifier:
        type: string
        description: A local identifier for this event (CIDOC-CRM P1_is_identified_by).
      eventType:
        type: string
        format: uri
        description: >-
          The type of event, typically a Getty AAT concept URI, e.g. production or restoration
          (CIDOC-CRM P2_has_type).
