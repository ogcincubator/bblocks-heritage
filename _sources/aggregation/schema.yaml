$schema: https://json-schema.org/draft/2020-12/schema
title: Aggregation
description: |
  An EDM/ORE aggregation: the wrapper Europeana/ECCCH actually ingests, pairing a
  `heritage-object` with the `digital-representation`(s) that depict it and the
  provider/rights metadata needed for publishing (CIDOC-CRM and PROV-O don't model this —
  it's an EDM/ORE-specific layer over the heritage object and digital representation blocks).
x-jsonld-context: context.jsonld
type: object
properties:
  id:
    type: string
    format: uri
    description: The persistent or local URI identifying this aggregation.
  type:
    const: Aggregation
  aggregatedCHO:
    type: string
    format: uri
    description: >-
      URI of the `heritage-object` (the "Cultural Heritage Object") this aggregation wraps
      (edm:aggregatedCHO).
  isShownBy:
    type: string
    format: uri
    description: >-
      URI of the primary `digital-representation` used to display the object, e.g. a
      high-resolution image or 3D model (edm:isShownBy).
  isShownAt:
    type: string
    format: uri
    description: >-
      URI of a landing page where the object can be viewed in its original context, e.g. the
      providing institution's own website (edm:isShownAt).
  hasView:
    type: array
    description: >-
      URIs of additional `digital-representation`(s) for this object beyond the primary one in
      `isShownBy` (edm:hasView).
    items:
      type: string
      format: uri
  object:
    type: string
    format: uri
    description: URI of a thumbnail image representing the aggregation (edm:object).
  dataProvider:
    type: string
    description: >-
      Name of the institution that physically holds the object and supplied this metadata
      (edm:dataProvider).
  provider:
    type: string
    description: >-
      Name of the aggregator that submitted the data on the data provider's behalf, e.g. an
      ECCCH national aggregator (edm:provider).
  rights:
    type: string
    format: uri
    description: >-
      URI of a rights statement governing reuse of the aggregated content, typically from
      rightsstatements.org or a Creative Commons license (edm:rights).
required:
  - aggregatedCHO
